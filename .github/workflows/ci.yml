name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install
        run: npm ci

      # Builds core first (downstream dts resolve `@lippelt/srd-core`), depois
      # builda todos — assim testes cross-package (ex.: integridade de pool no
      # npcgen, que importa os pacotes de sistema) resolvem o `dist`.
      - name: Build core (typegen for downstream packages)
        run: npm run build -w packages/core

      - name: Build all (dist para testes cross-package)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Smoke — assert each package generated dist
        run: |
          for pkg in packages/*/; do
            test -f "${pkg}dist/index.js"  || (echo "missing ${pkg}dist/index.js"; exit 1)
            test -f "${pkg}dist/index.cjs" || (echo "missing ${pkg}dist/index.cjs"; exit 1)
            test -f "${pkg}dist/index.d.ts" || (echo "missing ${pkg}dist/index.d.ts"; exit 1)
          done

      - name: Audit (high/critical only)
        run: npm audit --audit-level=high
